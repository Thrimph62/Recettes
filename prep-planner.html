<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning de Préparation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0f2d5a;--navy2:#1a4a8a;--navy3:#5a86c4;--ice:#e8f0fb;--ice2:#f5f8fe;--border:#c8d9f0;--text:#1a1a2e;--muted:#5a6a8a;--bg:#f0f2f7;--white:#fff;--gold:#b8860b;--green:#1a7a4a;--red:#a02020;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-nav{background:var(--navy);padding:0 2.5rem;display:flex;align-items:center;border-bottom:.5px solid rgba(255,255,255,.08);}
.nav-brand{font-family:'DM Serif Display',serif;color:#fff;font-size:17px;font-weight:400;padding:1rem 0;margin-right:2rem;text-decoration:none;white-space:nowrap;}
.nav-links{display:flex;}
.nav-link{color:rgba(255,255,255,.45);text-decoration:none;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:1rem 1.2rem;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.nav-link:hover{color:rgba(255,255,255,.8);}
.nav-link.active{color:#fff;border-bottom-color:var(--gold);}
.app-header{background:var(--navy);padding:1.5rem 2.5rem;display:flex;align-items:center;gap:1rem;}
.header-title{color:#fff;flex:1;}
.header-title h1{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;margin-bottom:2px;}
.header-title p{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-white{background:rgba(255,255,255,.12);color:#fff;border:.5px solid rgba(255,255,255,.2);}
.btn-white:hover{background:rgba(255,255,255,.22);}
.btn-ghost{background:var(--ice);color:var(--navy2);border:.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--navy3);}
.btn-success{background:#1a7a4a;color:#fff;}
.btn-success:hover{background:#155e3a;}
.btn-sm{padding:5px 12px;font-size:11px;}
.app-body{max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 3rem;}
.status-bar{padding:9px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.status-bar.success{background:#edfaf3;color:var(--green);border:.5px solid #a0ddc0;}
.status-bar.error{background:#fef0f0;color:var(--red);border:.5px solid #f0c0c0;}
.status-bar.info{background:var(--ice);color:var(--navy2);border:.5px solid var(--border);}
.hidden{display:none!important;}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1rem;gap:1rem;}
.section-title{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--navy);}
.section-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.days-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem;}
.day-card{background:var(--white);border:.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(15,45,90,.04);}
.day-card-head{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border);}
.day-card-head.empty{background:var(--ice2);}
.day-card-head.has-meals{background:var(--navy);}
.day-card-head.is-today.empty{background:var(--ice);border-left:3px solid var(--navy3);}
.day-card-head.is-today.has-meals{background:var(--navy2);}
.day-name{font-size:13px;font-weight:600;}
.day-card-head.has-meals .day-name,.day-card-head.has-meals .day-date{color:#fff;}
.day-card-head.has-meals .day-date{opacity:.6;}
.day-card-head.empty .day-name{color:var(--navy2);}
.day-card-head.empty .day-date{color:var(--muted);}
.day-date{font-family:'DM Mono',monospace;font-size:11px;}
.today-pip{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.2);color:#fff;}
.day-card-body{padding:10px 14px 14px;}
.no-meal{font-size:12px;color:var(--muted);font-style:italic;padding:4px 2px;}
.meal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--ice);}
.meal-row:last-child{border-bottom:none;}
.meal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.meal-info{flex:1;min-width:0;}
.meal-type{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.meal-recipes{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meal-time-input{padding:4px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:var(--white);outline:none;width:80px;flex-shrink:0;}
.meal-time-input:focus{border-color:var(--navy3);}
#agenda-plan{margin-top:2rem;}
.plan-day-section{margin-bottom:2rem;}
.plan-day-title{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;padding:12px 20px;background:var(--navy);color:#fff;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:12px;}
.plan-day-date{font-size:12px;color:rgba(255,255,255,.5);margin-left:auto;font-family:'DM Mono',monospace;}
.plan-tabs{display:flex;gap:4px;background:var(--ice2);padding:8px 12px 0;border-left:.5px solid var(--border);border-right:.5px solid var(--border);}
.plan-tab{padding:6px 16px;border-radius:8px 8px 0 0;border:.5px solid var(--border);background:var(--ice2);cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:none;}
.plan-tab.active{background:var(--white);color:var(--navy2);}
.plan-tab-content{background:var(--white);border:.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:16px 20px;}
.tl{display:flex;flex-direction:column;}
.tl-row{display:flex;align-items:stretch;}
.tl-lbl{width:52px;flex-shrink:0;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding-top:6px;text-align:right;padding-right:10px;}
.tl-track{flex:1;border-top:.5px solid var(--border);padding:3px 0 3px 6px;display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start;min-height:36px;}
.tl-track.half{border-top-style:dashed;opacity:.4;min-height:18px;}
.pb{border-radius:7px;padding:6px 11px;display:inline-flex;flex-direction:column;border:.5px solid rgba(0,0,0,.1);min-width:150px;max-width:280px;}
.pb-recipe{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px;}
.pb-phase{font-size:12px;font-weight:500;color:#1a1a2e;line-height:1.3;}
.pb-time{font-family:'DM Mono',monospace;font-size:10px;opacity:.65;margin-top:2px;}
.pb-dur{font-size:10px;padding:1px 6px;border-radius:6px;background:rgba(255,255,255,.4);width:fit-content;margin-top:2px;}
.pb-btn{margin-top:4px;font-size:10px;padding:2px 7px;border-radius:5px;border:.5px solid currentColor;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;}
.adv-grp{margin-bottom:1.25rem;}
.adv-grp-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.adv-badge{padding:2px 11px;border-radius:10px;background:var(--navy);color:#fff;font-size:11px;}
.adv-list{display:flex;flex-direction:column;gap:5px;}
.adv-row{display:flex;align-items:center;gap:10px;padding:9px 13px;border:.5px solid var(--border);border-radius:8px;background:var(--ice2);}
.adv-recipe{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;min-width:110px;}
.adv-phase{font-size:13px;flex:1;}
.adv-dur{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.adv-type{font-size:11px;padding:2px 7px;border-radius:7px;background:var(--ice);color:var(--navy3);border:.5px solid var(--border);}
.adv-btn{font-size:11px;padding:2px 8px;border-radius:6px;border:.5px solid var(--border);background:var(--white);cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;}
.adv-btn:hover{border-color:var(--navy3);color:var(--navy2);}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.empty-plan{text-align:center;padding:2rem;color:var(--muted);}
.empty-plan .em{font-size:28px;margin-bottom:6px;}
.empty-plan p{font-size:13px;}

/* ── GOOGLE AGENDA VIEW ── */
.gcal-wrap{background:var(--white);border:.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(15,45,90,.07);}
.gcal-header{display:flex;border-bottom:.5px solid var(--border);}
.gcal-gutter{width:56px;flex-shrink:0;border-right:.5px solid var(--border);background:var(--ice2);}
.gcal-day-header{flex:1;text-align:center;padding:10px 4px 8px;border-right:.5px solid var(--border);background:var(--ice2);}
.gcal-day-header:last-child{border-right:none;}
.gcal-day-name{font-size:12px;font-weight:600;color:var(--navy2);}
.gcal-day-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.gcal-day-header.is-today .gcal-day-name{color:#fff;}
.gcal-day-header.is-today .gcal-day-date{color:rgba(255,255,255,.7);}
.gcal-day-header.is-today{background:var(--navy2);}
.gcal-day-header.empty{opacity:.5;}
.gcal-body{display:flex;overflow-y:auto;max-height:600px;}
.gcal-time-col{width:56px;flex-shrink:0;border-right:.5px solid var(--border);}
.gcal-hour-label{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.gcal-days-area{flex:1;display:flex;position:relative;}
.gcal-day-col{flex:1;border-right:.5px solid var(--border);position:relative;}
.gcal-day-col:last-child{border-right:none;}
.gcal-hour-row{height:60px;border-top:.5px solid var(--border);}
.gcal-hour-row.half{border-top-style:dashed;opacity:.4;}
.gcal-event{position:absolute;left:3px;right:3px;border-radius:5px;padding:3px 6px;font-size:11px;overflow:hidden;cursor:default;z-index:1;border:.5px solid rgba(0,0,0,.15);}
.gcal-event-recipe{font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.03em;opacity:.8;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gcal-event-phase{font-size:11px;font-weight:500;line-height:1.3;overflow:hidden;}
.gcal-event-time{font-family:'DM Mono',monospace;font-size:10px;opacity:.65;margin-top:1px;}
/* ADV panel below calendar */
.adv-panel{padding:16px 20px;border-top:.5px solid var(--border);background:var(--ice2);}
.adv-panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px;}

@media print{.app-nav,.app-header,.btn,.pb-btn,.adv-btn{display:none!important;}body{background:#fff;}.gcal-body{max-height:none !important;}}
</style>
</head>

<nav class="app-nav">
  <a href="index.html" class="nav-brand">🍽 Mes Recettes</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Bibliothèque</a>
    <a href="recipe-parser.html" class="nav-link">Parseur</a>
    <a href="menu-builder.html" class="nav-link">Menus</a>
    <a href="prep-planner.html" class="nav-link active">Planning</a>
  </div>
</nav>
<script>
const SUPABASE_URL='VOTRE_URL_SUPABASE';
const SUPABASE_ANON_KEY='VOTRE_CLE_ANON';
const TABLE_NAME='recettes';
let sbClient=null;
try{sbClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}catch(e){}
</script>
<header class="app-header">
  <div class="header-title">
    <h1>Planning de Préparation</h1>
    <p>Horaires de service · Agenda J-1 / Jour J</p>
  </div>
  <button class="btn btn-white" onclick="loadData()">🔄 Actualiser</button>
  <button class="btn btn-white btn-sm" onclick="window.print()">🖨️ Imprimer</button>
</header>
<main class="app-body">
  <div id="status" class="hidden status-bar"></div>
  <div id="step-grid">
    <div class="section-head">
      <div>
        <div class="section-title" id="grid-title">Semaine du menu</div>
        <div class="section-sub" id="grid-sub">Chargement…</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-ghost btn-sm" onclick="saveTimings()">💾 Sauvegarder les horaires</button>
        <button class="btn btn-success" onclick="generateAgenda()">▶ Générer le planning</button>
      </div>
    </div>
    <div class="days-grid" id="days-grid">
      <div style="grid-column:span 3;padding:3rem;text-align:center;color:var(--muted);font-size:13px;">Chargement…</div>
    </div>
  </div>
  <div id="agenda-plan" class="hidden">
    <div class="section-head">
      <div>
        <div class="section-title">Planning complet</div>
        <div class="section-sub">Phases Jour J et préparations à l'avance · tous les jours</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('agenda-plan').classList.add('hidden');window.scrollTo({top:0,behavior:'smooth'})">← Retour aux horaires</button>
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Imprimer</button>
      </div>
    </div>
    <div id="agenda-content"></div>
  </div>
</main>
<script>
const MEAL_COLORS={pd:'#f59e0b',dj:'#3b82f6',ap:'#22c55e',di:'#6366f1',de:'#ec4899',bo:'#06b6d4',sp:'#f97316'};
const MEAL_LABELS={pd:'Petit-déj.',dj:'Déjeuner',ap:'Apéritif',di:'Dîner',de:'Dessert',bo:'Boisson',sp:'Spécial'};
const MEAL_ICONS={pd:'🌅',dj:'🍽️',ap:'🥂',di:'🌙',de:'🍮',bo:'🥤',sp:'⭐'};
const MEAL_ORDER=['pd','dj','ap','di','de','bo','sp'];
const DAYS_FR=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const DEFAULT_TIMES={pd:'08:00',dj:'12:30',ap:'18:30',di:'19:30',de:'20:30',bo:'12:30',sp:'20:00'};
let recipes=[],menu={},numDays=7,startDate=null,dateKeys=[],mealTimings={},phaseOverrides={};

function localDateKey(dt){const y=dt.getFullYear();const m=String(dt.getMonth()+1).padStart(2,'0');const d=String(dt.getDate()).padStart(2,'0');return y+'-'+m+'-'+d;}

/* Given a dateKey index, return the correct LOCAL display date */
function displayDateForIndex(i){
  if(!startDate) return parseLocalDate(dateKeys[i]||'2000-01-01');
  const sd=parseLocalDate(startDate);
  const dt=new Date(sd); dt.setDate(sd.getDate()+i);
  return dt;
}
function displayDateForKey(key){
  const i=dateKeys.indexOf(key);
  return displayDateForIndex(i>=0?i:0);
}
function parseLocalDate(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function nrm(r){if(r.baseportions!==undefined&&r.basePortions===undefined)r.basePortions=r.baseportions;return r;}

async function loadData(){
  showStatus('info','⏳ Chargement depuis Supabase…');
  try{
    if(sbClient){
      const{data:rd,error:re}=await sbClient.from(TABLE_NAME).select('*');
      if(!re&&rd&&rd.length){recipes=rd.map(nrm);localStorage.setItem('recipe-library',JSON.stringify(recipes));}
      const{data:md,error:me}=await sbClient.from('menus').select('menu,meal_timings').eq('id','menu-principal').single();
      if(!me&&md&&md.menu){const ms=md.menu;menu=ms.menu||{};numDays=ms.numDays||7;startDate=ms.startDate||null;localStorage.setItem('weekly-menu',JSON.stringify(ms));}
      if(!me&&md&&md.meal_timings){mealTimings=md.meal_timings;localStorage.setItem('meal-timings',JSON.stringify(mealTimings));}
    }
    if(!recipes.length){const r=localStorage.getItem('recipe-library');if(r)recipes=JSON.parse(r).map(nrm);}
    if(!Object.keys(menu).length){const m=localStorage.getItem('weekly-menu');if(m){const ms=JSON.parse(m);menu=ms.menu||{};numDays=ms.numDays||7;startDate=ms.startDate||null;}}
    mealTimings=JSON.parse(localStorage.getItem('meal-timings')||'{}');
    if(!Object.keys(menu).length){
      showStatus('error','❌ Aucun menu. Créez d\'abord un menu dans le Menu Builder.');
      document.getElementById('days-grid').innerHTML='<div style="grid-column:span 3;padding:3rem;text-align:center;font-size:13px;color:var(--muted)">Aucun menu — <a href="menu-builder.html" style="color:var(--navy2)">ouvrir le Menu Builder</a></div>';
      return;
    }
    if(startDate){
      /* Recreate UTC-shifted keys exactly as Menu Builder does (toISOString) */
      dateKeys=[];
      const sd=parseLocalDate(startDate);
      for(let d=0;d<numDays;d++){
        const dt=new Date(sd); dt.setDate(sd.getDate()+d);
        dateKeys.push(dt.toISOString().split('T')[0]);
      }
    } else {
      dateKeys=Object.keys(menu).filter(k=>k.includes('-')).sort().slice(0,numDays);
    }
    renderGrid();
    showStatus('success','✓ Menu chargé — ajustez les horaires puis cliquez « Générer le planning ».');
  }catch(e){showStatus('error','❌ '+e.message);}
}

function renderGrid(){
  if(!dateKeys.length) return;
  const first=displayDateForIndex(0);
  const last=displayDateForIndex(dateKeys.length-1);
  document.getElementById('grid-title').textContent='Semaine du '
    +first.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})
    +' au '+last.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('grid-sub').textContent=dateKeys.length+' jours · '+dateKeys.filter(k=>getMeals(k).length>0).length+' jours avec recettes';
  const today=localDateKey(new Date());
  let html='';
  for(const key of dateKeys){
    const idx=dateKeys.indexOf(key);
    const dt=displayDateForIndex(idx>=0?idx:0);
    const di=dt.getDay()===0?6:dt.getDay()-1;
    const meals=getMeals(key);
    const hasMeals=meals.length>0;
    const isToday=localDateKey(dt)===today;
    html+=`<div class="day-card"><div class="day-card-head ${hasMeals?'has-meals':'empty'} ${isToday?'is-today':''}">
      <div class="day-name">${DAYS_FR[di]}</div>
      <div class="day-date">${dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
      ${isToday?'<div class="today-pip">Aujourd\'hui</div>':''}
    </div><div class="day-card-body">`;
    if(!hasMeals){
      html+='<div class="no-meal">Aucune recette</div>';
    } else {
      for(const{mealId,slots}of meals){
        const c=MEAL_COLORS[mealId]||'#888';
        const saved=(mealTimings[key]&&mealTimings[key][mealId])||DEFAULT_TIMES[mealId]||'12:00';
        const names=slots.map(s=>{const r=recipes.find(r=>r.id===s.recipeId);return r?r.title:'?';}).join(', ');
        html+=`<div class="meal-row">
          <div class="meal-dot" style="background:${c}"></div>
          <div class="meal-info">
            <div class="meal-type">${MEAL_ICONS[mealId]} ${MEAL_LABELS[mealId]}</div>
            <div class="meal-recipes" title="${names}">${names}</div>
          </div>
          <input type="time" class="meal-time-input" value="${saved}" onchange="onTC('${key}','${mealId}',this.value)">
        </div>`;
      }
    }
    html+='</div></div>';
  }
  document.getElementById('days-grid').innerHTML=html;
}

function getMeals(key){
  if(!menu[key]) return [];
  const res=[];
  for(const mealId of MEAL_ORDER){
    const slots=menu[key][mealId];if(!slots) continue;
    const arr=Array.isArray(slots)?slots:[slots];
    const active=arr.filter(s=>s&&s.recipeId);
    if(active.length) res.push({mealId,slots:active});
  }
  return res;
}

function onTC(key,mealId,val){if(!mealTimings[key])mealTimings[key]={};mealTimings[key][mealId]=val;}

async function saveTimings(){
  localStorage.setItem('meal-timings',JSON.stringify(mealTimings));
  if(sbClient){
    const{error}=await sbClient.from('menus').update({meal_timings:mealTimings}).eq('id','menu-principal');
    if(error){showStatus('error','❌ '+error.message);return;}
    showStatus('success','✓ Horaires sauvegardés dans Supabase.');
  } else {
    showStatus('success','✓ Horaires sauvegardés localement.');
  }
}

function generateAgenda(){
  if(!dateKeys.length){showStatus('error','❌ Aucune recette planifiée.');return;}

  /* Collect all plans */
  const allDayJ={}, allAdv={};
  let globalMin=23*60, globalMax=6*60;
  const today=localDateKey(new Date());

  for(const key of dateKeys){
    const{dayJ,adv}=computeDay(key);
    allDayJ[key]=dayJ; allAdv[key]=adv;
    for(const ph of dayJ){
      if(ph.startMin<globalMin) globalMin=ph.startMin;
      if(ph.endMin>globalMax) globalMax=ph.endMin;
    }
  }
  const h0=Math.max(6,Math.floor(globalMin/60)-1);
  const h1=Math.min(23,Math.ceil(globalMax/60)+1);
  const totalHours=h1-h0+1;
  const PX_PER_MIN=1; /* 1px per minute = 60px per hour */

  /* Header */
  let html='<div class="gcal-wrap">';
  html+='<div class="gcal-header"><div class="gcal-gutter"></div>';
  for(const key of dateKeys){
    const dt=displayDateForKey(key);
    const di=dt.getDay()===0?6:dt.getDay()-1;
    const hasMeals=getMeals(key).length>0;
    const isToday=localDateKey(dt)===today;
    html+=`<div class="gcal-day-header ${isToday?'is-today':''} ${!hasMeals?'empty':''}">
      <div class="gcal-day-name">${DAYS_FR[di]}</div>
      <div class="gcal-day-date">${dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
    </div>`;
  }
  html+='</div>'; /* end header */

  /* Body */
  html+='<div class="gcal-body">';
  /* Time column */
  html+='<div class="gcal-time-col">';
  for(let h=h0;h<=h1;h++){
    html+=`<div class="gcal-hour-label">${String(h).padStart(2,'0')}:00</div>`;
  }
  html+='</div>';

  /* Days area */
  html+='<div class="gcal-days-area">';
  for(const key of dateKeys){
    const height=totalHours*60;
    /* Draw hour grid lines */
    let gridLines='';
    for(let h=h0;h<=h1;h++){
      gridLines+=`<div class="gcal-hour-row" style="height:60px;position:absolute;top:${(h-h0)*60}px;left:0;right:0;"></div>`;
    }
    /* Draw events */
    let events='';
    for(const ph of (allDayJ[key]||[])){
      const top=(ph.startMin-h0*60)*PX_PER_MIN;
      const ht=Math.max(22,(ph.endMin-ph.startMin)*PX_PER_MIN);
      const c=ph.color, lt=lighten(c,.85);
      events+=`<div class="gcal-event" style="background:${lt};border-color:${c};top:${top}px;height:${ht}px;color:${c}">
        <div class="gcal-event-recipe">${ph.recipe.title}</div>
        <div class="gcal-event-phase">${ph.phase.letter?ph.phase.letter+'. ':''}${ph.phase.title}</div>
        ${ht>36?`<div class="gcal-event-time">${m2t(ph.startMin)} → ${m2t(ph.endMin)}</div>`:''}
      </div>`;
    }
    html+=`<div class="gcal-day-col" style="height:${height}px;position:relative;">${gridLines}${events}</div>`;
  }
  html+='</div>'; /* days area */
  html+='</div>'; /* body */
  html+='</div>'; /* gcal-wrap */

  /* Advance prep panels per day */
  const advDays=dateKeys.filter(k=>(allAdv[k]||[]).length>0);
  if(advDays.length){
    html+='<div style="margin-top:1.5rem;">';
    html+='<div class="section-title" style="margin-bottom:1rem;">Pr\u00e9parations \u00e0 l\u2019avance</div>';
    for(const key of advDays){
      const dt=displayDateForKey(key);
      const di=dt.getDay()===0?6:dt.getDay()-1;
      const did='d'+key.replace(/-/g,'');
      html+=`<div class="plan-day-section">
        <div class="plan-day-title">${DAYS_FR[di]} ${dt.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}<span class="plan-day-date">${key}</span></div>
        <div class="plan-tab-content">${rAdv(allAdv[key],did,key)}</div>
      </div>`;
    }
    html+='</div>';
  }

  document.getElementById('agenda-content').innerHTML=html;
  document.getElementById('agenda-plan').classList.remove('hidden');
  setTimeout(()=>document.getElementById('agenda-plan').scrollIntoView({behavior:'smooth',block:'start'}),50);
}

function computeDay(key){
  const meals=getMeals(key);
  const dayJ=[],adv=[];
  for(const{mealId,slots}of meals){
    const svc=(mealTimings[key]&&mealTimings[key][mealId])||DEFAULT_TIMES[mealId]||'12:00';
    const svcMin=t2m(svc);
    const color=MEAL_COLORS[mealId];
    for(const slot of slots){
      const recipe=recipes.find(r=>r.id===slot.recipeId);
      if(!recipe||!recipe.phases) continue;
      let cursor=svcMin;
      for(let pi=recipe.phases.length-1;pi>=0;pi--){
        const phase=recipe.phases[pi];
        const ok=recipe.id+'__'+key+'__'+pi;
        const ov=phaseOverrides[ok];
        const dur=getPDur(phase);
        const rest=ov==='advance'||(ov!=='dayj'&&isRest(phase));
        if(rest){adv.push({recipe,phase,pi,daysBack:dur>=720?2:1,dur,mealId,color,ok});}
        else{dayJ.push({recipe,phase,pi,startMin:cursor-dur,endMin:cursor,dur,mealId,color,ok});cursor-=dur;}
      }
    }
  }
  return{dayJ,adv};
}

function rDayJ(phases,did,key){
  if(!phases.length) return '<div class="empty-plan"><div class="em">☀️</div><p>Toutes les étapes sont en J-1.</p></div>';
  const s0=Math.min(...phases.map(p=>p.startMin));
  const s1=Math.max(...phases.map(p=>p.endMin));
  const h0=Math.max(0,Math.floor(s0/60)-1);
  const h1=Math.min(23,Math.ceil(s1/60)+1);
  const seen=new Set();
  let leg='<div class="legend">';
  for(const ph of phases){if(!seen.has(ph.mealId)){seen.add(ph.mealId);leg+=`<div class="legend-item"><div class="legend-dot" style="background:${ph.color}"></div>${MEAL_ICONS[ph.mealId]} ${MEAL_LABELS[ph.mealId]}</div>`;}}
  leg+='</div>';
  let tl='<div class="tl">';
  for(let h=h0;h<=h1;h++){
    for(let half=0;half<2;half++){
      const slotMin=h*60+half*30;
      const isH=half===0;
      const sp=phases.filter(ph=>ph.startMin>=slotMin&&ph.startMin<slotMin+30);
      const blocks=sp.map(ph=>{
        const c=ph.color,lt=lighten(c,.88);
        return `<div class="pb" style="background:${lt};border-color:${c}20">
          <div class="pb-recipe" style="color:${c}">${ph.recipe.title}</div>
          <div class="pb-phase">${ph.phase.letter?ph.phase.letter+'. ':''}${ph.phase.title}</div>
          <div class="pb-time">${m2t(ph.startMin)} → ${m2t(ph.endMin)}</div>
          <div class="pb-dur" style="color:${c}">⏱ ${fmtDur(ph.dur)}</div>
          <button class="pb-btn" style="color:${c}" onclick="togPhase('${ph.ok}','${did}','${key}')">⇄ J-1</button>
        </div>`;
      }).join('');
      tl+=`<div class="tl-row"><div class="tl-lbl">${isH?String(h).padStart(2,'0')+':00':''}</div><div class="tl-track ${isH?'':'half'}">${blocks}</div></div>`;
    }
  }
  tl+='</div>';
  return leg+tl;
}

function rAdv(phases,did,key){
  if(!phases.length) return '<div class="empty-plan"><div class="em">✅</div><p>Aucune préparation à l\'avance nécessaire.</p></div>';
  const groups={};
  for(const ph of phases){if(!groups[ph.daysBack])groups[ph.daysBack]=[];groups[ph.daysBack].push(ph);}
  let html='';
  for(const db of Object.keys(groups).sort((a,b)=>b-a)){
    const label=db==1?'J − 1 (veille)':db==2?'J − 2 (avant-veille)':`J − ${db}`;
    html+=`<div class="adv-grp"><div class="adv-grp-title"><span class="adv-badge">${label}</span></div><div class="adv-list">`;
    for(const ph of groups[db]){
      html+=`<div class="adv-row">
        <div class="adv-recipe" style="color:${ph.color}">${MEAL_ICONS[ph.mealId]||''} ${ph.recipe.title}</div>
        <div class="adv-phase">${ph.phase.letter?ph.phase.letter+'. ':''}${ph.phase.title}</div>
        <div class="adv-dur">${fmtDur(ph.dur)}</div>
        <div class="adv-type">${isRest(ph.phase)?'💤 Repos':'🔪 Prep'}</div>
        <button class="adv-btn" onclick="togPhase('${ph.ok}','${did}','${key}')">⇄ Jour J</button>
      </div>`;
    }
    html+='</div></div>';
  }
  return html;
}

function togPhase(ok,did,key){
  const c=phaseOverrides[ok];
  if(c==='advance')phaseOverrides[ok]='dayj';
  else if(c==='dayj')delete phaseOverrides[ok];
  else phaseOverrides[ok]='advance';
  const{dayJ,adv}=computeDay(key);
  const pj=document.getElementById('pp-dj-'+did);
  const pa=document.getElementById('pp-av-'+did);
  if(pj)pj.innerHTML=rDayJ(dayJ,did,key);
  if(pa)pa.innerHTML=rAdv(adv,did,key);
}

function swTab(did,tab){
  ['dj','av'].forEach(t=>{
    document.getElementById('pt-'+t+'-'+did)?.classList.toggle('active',t===tab);
    document.getElementById('pp-'+t+'-'+did)?.classList.toggle('hidden',t!==tab);
  });
}

function getPDur(phase){
  let max=0;
  for(const b of(phase.timeBadges||[])){const d=parseDurStr(b);if(d>max)max=d;}
  if(!max&&phase.steps){for(const s of phase.steps){const ns=[...s.matchAll(/(\d+)\s*min/gi)].map(m=>parseInt(m[1]));for(const n of ns)if(n>max)max=n;}}
  return max||30;
}
function parseDurStr(str){
  if(!str) return 0;
  const s=str.replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27FF}]/gu,'').trim();
  const hm=s.match(/(\d+)\s*h\s*(\d+)?\s*(?:min)?/i);
  if(hm) return parseInt(hm[1])*60+(parseInt(hm[2])||0);
  const h=s.match(/(\d+)\s*h/i);if(h) return parseInt(h[1])*60;
  const m=s.match(/(\d+)\s*min/i);if(m) return parseInt(m[1]);
  const n=parseInt(s);return isNaN(n)?0:n;
}
function isRest(phase){const t=(phase.title||'').toLowerCase();return t.includes('repos')||t.includes('marinade')||t.includes('réfrigér')||t.includes('congel')||t.includes('nuit')||t.includes('levée')||t.includes('rest');}
function t2m(str){if(!str)return 720;const[h,m]=str.split(':').map(Number);return h*60+(m||0);}
function m2t(min){const h=Math.floor(min/60)%24;const m=((min%60)+60)%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function fmtDur(min){if(min<60)return min+'min';const h=Math.floor(min/60),m=min%60;return m?h+'h'+String(m).padStart(2,'0'):h+'h';}
function lighten(hex,a){const n=parseInt(hex.replace('#',''),16);const r=Math.round(((n>>16)&0xff)*(1-a)+255*a);const g=Math.round(((n>>8)&0xff)*(1-a)+255*a);const b=Math.round((n&0xff)*(1-a)+255*a);return `rgb(${r},${g},${b})`;}
function showStatus(type,msg){const el=document.getElementById('status');el.className='status-bar '+type;el.textContent=msg;el.classList.remove('hidden');if(type==='success')setTimeout(()=>el.classList.add('hidden'),4000);}

loadData();
</script>
