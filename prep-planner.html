<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificateur de Préparation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0f2d5a;--navy2:#1a4a8a;--navy3:#5a86c4;
  --ice:#e8f0fb;--ice2:#f5f8fe;--border:#c8d9f0;
  --text:#1a1a2e;--muted:#5a6a8a;
  --bg:#f0f2f7;--white:#fff;
  --green:#1a7a4a;--red:#a02020;--gold:#b8860b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
.app-nav{background:var(--navy);padding:0 2.5rem;display:flex;align-items:center;border-bottom:0.5px solid rgba(255,255,255,.08);}
.nav-brand{font-family:'DM Serif Display',serif;color:#fff;font-size:17px;font-weight:400;padding:1rem 0;margin-right:2rem;white-space:nowrap;}
.nav-links{display:flex;}
.nav-link{color:rgba(255,255,255,.45);text-decoration:none;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:1rem 1.2rem;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.nav-link:hover{color:rgba(255,255,255,.8);}
.nav-link.active{color:#fff;border-bottom-color:var(--gold);}

/* HEADER */
.app-header{background:var(--navy);padding:1.25rem 2.5rem;display:flex;align-items:center;gap:1.25rem;}
.header-icon{width:42px;height:42px;background:rgba(255,255,255,.1);border:0.5px solid rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;}
.header-title h1{font-family:'DM Serif Display',serif;font-size:19px;font-weight:400;color:#fff;margin-bottom:2px;}
.header-title p{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase;}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-white{background:rgba(255,255,255,.12);color:#fff;border:0.5px solid rgba(255,255,255,.2);}
.btn-white:hover{background:rgba(255,255,255,.22);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy2);}
.btn-ghost{background:var(--ice);color:var(--navy2);border:0.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--navy3);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{opacity:.9;}
.btn-sm{padding:5px 12px;font-size:11px;}

.app-body{max-width:860px;margin:0 auto;padding:2rem 1.5rem;}

/* STATUS */
.status-bar{padding:9px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.status-bar.success{background:#edfaf3;color:var(--green);border:0.5px solid #a0ddc0;}
.status-bar.error{background:#fef0f0;color:var(--red);border:0.5px solid #f0c0c0;}
.status-bar.info{background:var(--ice);color:var(--navy2);border:0.5px solid var(--border);}
.hidden{display:none!important;}

/* SETUP CARD */
.setup-card{background:var(--white);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;box-shadow:0 1px 6px rgba(15,45,90,.05);}
.setup-header{background:var(--ice);padding:12px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.setup-header-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--navy2);}
.setup-body{padding:16px 18px;display:flex;flex-direction:column;gap:6px;}
.setup-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--ice2);}
.setup-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.setup-meal-label{font-size:12px;font-weight:500;min-width:80px;}
.setup-chips{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.setup-chip{font-size:11px;padding:2px 9px;border-radius:10px;background:var(--white);border:0.5px solid var(--border);color:var(--navy2);}
.time-picker{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:var(--white);outline:none;width:84px;}
.time-picker:focus{border-color:var(--navy3);}
.setup-actions{padding:12px 18px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;}

/* DAY SECTION */
.day-section{margin-bottom:2rem;}
.day-header{
  display:flex;align-items:center;gap:12px;margin-bottom:12px;
  padding:14px 18px;background:var(--navy);border-radius:12px;
  box-shadow:0 2px 8px rgba(15,45,90,.12);
}
.day-header-date{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;color:#fff;}
.day-header-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.day-header-badge{
  margin-left:auto;padding:3px 12px;border-radius:12px;
  background:rgba(255,255,255,.12);border:0.5px solid rgba(255,255,255,.2);
  font-size:11px;color:rgba(255,255,255,.7);font-family:'DM Mono',monospace;
}
.day-empty{
  padding:20px;text-align:center;color:var(--muted);font-size:13px;
  background:var(--white);border:0.5px solid var(--border);border-radius:12px;
}

/* SECTION TYPE (Avance / Jour J) */
.plan-section{background:var(--white);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 5px rgba(15,45,90,.04);}
.plan-section-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:0.5px solid var(--border);
}
.plan-section-header.dayj{background:var(--ice);}
.plan-section-header.advance{background:#fff8f0;}
.psh-icon{font-size:16px;}
.psh-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--navy2);}
.psh-title.advance{color:#a06000;}
.psh-count{margin-left:auto;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

/* STEP ROW */
.step-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:0.5px solid var(--ice);
  transition:background .1s;
}
.step-row:last-child{border-bottom:none;}
.step-row:hover{background:var(--ice2);}
.step-row.done{opacity:.45;}
.step-row.done .step-name,.step-row.done .step-recipe{text-decoration:line-through;color:var(--muted);}

.step-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--navy);flex-shrink:0;}

/* time column */
.step-time{
  display:flex;flex-direction:column;align-items:flex-end;gap:1px;
  min-width:88px;flex-shrink:0;
}
.step-time-range{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--navy2);white-space:nowrap;}
.step-time-range.advance-label{color:#a06000;font-size:11px;}
.step-dur{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* color bar */
.step-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0;}

/* content */
.step-content{flex:1;min-width:0;}
.step-recipe{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px;}
.step-name{font-size:13px;font-weight:500;color:var(--text);}

/* phase badge */
.step-phase-badge{
  font-size:10px;padding:2px 8px;border-radius:8px;
  background:var(--ice);color:var(--navy3);border:0.5px solid var(--border);
  flex-shrink:0;white-space:nowrap;
}

.week-empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
.week-empty .em{font-size:40px;margin-bottom:12px;}
.week-empty p{font-size:13px;}

@media print{
  .app-nav,.app-header,.setup-card,.btn{display:none!important;}
  .day-header{background:var(--navy)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{background:#fff;}
}
</style>
</head>
<body>

<nav class="app-nav">
  <div class="nav-brand">🍽️ Recettes</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Bibliothèque</a>
    <a href="recipe-parser.html" class="nav-link">Parseur</a>
    <a href="menu-builder.html" class="nav-link">Menu</a>
    <a href="prep-planner.html" class="nav-link active">Planificateur</a>
  </div>
</nav>

<header class="app-header">
  <div class="header-icon">⏱️</div>
  <div class="header-title">
    <h1>Planificateur de Préparation</h1>
    <p>Planning semaine — Jour J + Préparation à l'avance</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-white btn-sm" onclick="window.print()">🖨️ Imprimer</button>
  </div>
</header>

<main class="app-body">
  <div id="status" class="hidden"></div>

  <!-- SERVICE TIMES SETUP -->
  <div class="setup-card" id="setup-card">
    <div class="setup-header">
      <span class="setup-header-title">⚙️ Horaires de service — définissez l'heure de chaque repas</span>
    </div>
    <div class="setup-body" id="setup-body">
      <p style="font-size:13px;color:var(--muted);">Chargement…</p>
    </div>
    <div class="setup-actions">
      <button class="btn btn-primary" onclick="generatePlan()">▶ Générer le planning</button>
      <button class="btn btn-ghost btn-sm" onclick="saveTimings()">💾 Sauvegarder les horaires</button>
    </div>
  </div>

  <!-- WEEKLY PLAN -->
  <div id="week-plan"></div>

</main>

<script>
/* ══════════════════════════════════════
   SUPABASE
══════════════════════════════════════ */
const SB_URL  = 'https://wcmbbgkjjlohxviwjivm.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjbWJiZ2tqamxvaHh2aXdqaXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDk5NTMsImV4cCI6MjA5MjE4NTk1M30.CUf2regwchLkDtCPnQn-lkVBMR42LKkvMQs3QEUfdMs';
let sb = null;
try { sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const MEAL_COLORS  = { pd:'#f59e0b',dj:'#3b82f6',ap:'#22c55e',di:'#6366f1',de:'#ec4899',bo:'#06b6d4',sp:'#f97316' };
const MEAL_LABELS  = { pd:'Petit-déj.',dj:'Déjeuner',ap:'Apéritif',di:'Dîner',de:'Dessert',bo:'Boisson',sp:'Spécial' };
const MEAL_ICONS   = { pd:'🌅',dj:'🍽️',ap:'🥂',di:'🌙',de:'🍮',bo:'🥤',sp:'⭐' };
const MEAL_ORDER   = ['pd','dj','ap','di','de','bo','sp'];
const DAYS_FR      = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MONTHS_FR    = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DEFAULT_T    = { pd:'08:00',dj:'12:30',ap:'18:30',di:'19:30',de:'20:30',bo:'12:30',sp:'20:00' };

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let recipes    = [];
let menu       = {};
let numDays    = 7;
let startDate  = '';
let mealTimings = {}; // mealTimings[dateKey][mealId] = "HH:MM"
let checkedSteps = new Set(); // "dateKey-recipeId-phaseIdx"

/* ══════════════════════════════════════
   DATE HELPERS
══════════════════════════════════════ */
function localDate(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function dayToDate(d) {
  const start = new Date(startDate+'T00:00:00');
  const dt    = new Date(start);
  dt.setDate(start.getDate() + parseInt(d, 10));
  return localDate(dt);
}
function dayToLabel(d) {
  const start = new Date(startDate+'T00:00:00');
  const dt    = new Date(start);
  dt.setDate(start.getDate() + parseInt(d, 10));
  const idx = dt.getDay()===0 ? 6 : dt.getDay()-1;
  return { name: DAYS_FR[idx], date: `${dt.getDate()} ${MONTHS_FR[dt.getMonth()]}`, isWE: dt.getDay()===0||dt.getDay()===6 };
}

/* ══════════════════════════════════════
   LOAD FROM SUPABASE
══════════════════════════════════════ */
async function loadAll() {
  if (!sb) { showStatus('error','❌ Supabase non disponible.'); return; }
  showStatus('info','Chargement des données…');
  try {
    const [rRes, mRes, tRes, cRes] = await Promise.all([
      sb.from('recettes_recettes').select('*'),
      sb.from('recettes_menus').select('data').eq('id','main').maybeSingle(),
      sb.from('recettes_menus').select('data').eq('id','timings').maybeSingle(),
      sb.from('recettes_menus').select('data').eq('id','plan-checks').maybeSingle(),
    ]);
    if (rRes.error) throw rRes.error;
    if (mRes.error) throw mRes.error;

    recipes   = rRes.data || [];
    const mp  = mRes.data?.data || {};
    menu      = mp.menu     || {};
    numDays   = mp.numDays  || 7;
    startDate = mp.startDate || localDate(new Date());
    mealTimings  = tRes.data?.data?.timings || {};
    checkedSteps = new Set(cRes.data?.data?.checks || []);

    buildSetupPanel();
    document.getElementById('status').classList.add('hidden');
  } catch(e) {
    showStatus('error','❌ '+e.message);
  }
}

async function saveTimings() {
  if (!sb) return;
  try {
    const { error } = await sb.from('recettes_menus').upsert(
      { id:'timings', data:{ timings: mealTimings }, updated_at: new Date().toISOString() },
      { onConflict:'id' }
    );
    if (error) throw error;
    showStatus('success','✓ Horaires sauvegardés.');
  } catch(e) { showStatus('error','❌ '+e.message); }
}

/* ══════════════════════════════════════
   SETUP PANEL — one row per meal per day
══════════════════════════════════════ */
function getMealsForDay(dateKey) {
  if (!menu[dateKey]) return [];
  const result = [];
  for (const mealId of MEAL_ORDER) {
    const slots = menu[dateKey][mealId];
    if (!slots) continue;
    const arr    = Array.isArray(slots) ? slots : [slots];
    const active = arr.filter(s => s?.recipeId);
    if (active.length) result.push({ mealId, slots: active });
  }
  return result;
}

function buildSetupPanel() {
  const body = document.getElementById('setup-body');
  let html = '';
  let anyMeals = false;

  for (let d = 0; d < numDays; d++) {
    const dateKey = dayToDate(d);
    const meals   = getMealsForDay(dateKey);
    if (!meals.length) continue;
    anyMeals = true;

    const lbl = dayToLabel(d);
    html += `<div style="margin-bottom:6px;">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:4px 0 6px;">${lbl.name} ${lbl.date}</div>`;
    for (const { mealId, slots } of meals) {
      const color = MEAL_COLORS[mealId]||'#888';
      const savedTime = mealTimings[dateKey]?.[mealId] || DEFAULT_T[mealId] || '12:00';
      const names = slots.map(s => recipes.find(r=>r.id===s.recipeId)?.title || '?');
      html += `<div class="setup-row">
        <div class="setup-dot" style="background:${color}"></div>
        <div class="setup-meal-label">${MEAL_ICONS[mealId]} ${MEAL_LABELS[mealId]||mealId}</div>
        <div class="setup-chips">${names.map(n=>`<span class="setup-chip">${n}</span>`).join('')}</div>
        <input type="time" class="time-picker" value="${savedTime}"
          onchange="onTimingChange('${dateKey}','${mealId}',this.value)">
      </div>`;
    }
    html += '</div>';
  }

  if (!anyMeals) {
    html = '<p style="font-size:13px;color:var(--muted);">Aucun repas dans le menu. Créez-en un dans le Menu Builder.</p>';
  }
  body.innerHTML = html;
}

function onTimingChange(dateKey, mealId, val) {
  if (!mealTimings[dateKey]) mealTimings[dateKey] = {};
  mealTimings[dateKey][mealId] = val;
}

/* ══════════════════════════════════════
   DURATION / PHASE HELPERS
══════════════════════════════════════ */
function parseDur(str) {
  if (!str) return 0;
  const s = str.replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27FF}]/gu,'').trim();
  const hm = s.match(/(\d+)\s*h\s*(\d+)?/i);
  if (hm) return parseInt(hm[1])*60+(parseInt(hm[2])||0);
  const h = s.match(/(\d+)\s*h/i); if(h) return parseInt(h[1])*60;
  const m = s.match(/(\d+)\s*min/i); if(m) return parseInt(m[1]);
  const n = parseInt(s); return isNaN(n)?0:n;
}
function getPhaseDur(phase) {
  let max = 0;
  for (const b of (phase.timeBadges||[])) max = Math.max(max, parseDur(b));
  return max || 15;
}
function isRest(phase) {
  const t = (phase.title||'').toLowerCase();
  return t.includes('repos')||t.includes('marinade')||t.includes('réfrigér')||
         t.includes('congel')||t.includes('macér')||t.includes('nuit')||
         t.includes('rest')||t.includes('levée')||t.includes('refroid')||
         (phase.timeBadges||[]).some(b=>b.includes('💤')||b.includes('😴'));
}
function minToTime(m) {
  const h=Math.floor(((m%1440)+1440)%1440/60), mm=((m%60)+60)%60;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function fmtDur(min) {
  if(min<60) return min+'min';
  const h=Math.floor(min/60), m=min%60;
  return m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`;
}

/* ══════════════════════════════════════
   GENERATE FULL PLAN
══════════════════════════════════════ */
function generatePlan() {
  const container = document.getElementById('week-plan');
  container.innerHTML = '';

  let totalSteps = 0;

  for (let d = 0; d < numDays; d++) {
    const dateKey = dayToDate(d);
    const meals   = getMealsForDay(dateKey);
    const lbl     = dayToLabel(d);

    // Collect all steps for this day
    const dayJSteps    = []; // {startMin, endMin, dur, recipe, phase, phaseIdx, mealId}
    const advanceSteps = []; // {daysBack, dur, recipe, phase, phaseIdx, mealId}

    for (const { mealId, slots } of meals) {
      const serviceTime = mealTimings[dateKey]?.[mealId] || DEFAULT_T[mealId] || '12:00';
      const serviceMin  = parseInt(serviceTime.split(':')[0])*60 + parseInt(serviceTime.split(':')[1]);
      const color = MEAL_COLORS[mealId];

      for (const slot of slots) {
        const recipe = recipes.find(r => r.id === slot.recipeId);
        if (!recipe) continue;
        let cursor = serviceMin;

        for (let pi = recipe.phases.length-1; pi >= 0; pi--) {
          const phase = recipe.phases[pi];
          const dur   = getPhaseDur(phase);

          if (isRest(phase) && dur >= 240) {
            // Only truly advance prep if rest is ≥ 4h
            advanceSteps.push({ daysBack: dur>=720?2:1, dur, recipe, phase, phaseIdx:pi, mealId, color });
          } else {
            dayJSteps.push({ startMin: cursor-dur, endMin: cursor, dur, recipe, phase, phaseIdx:pi, mealId, color });
            cursor -= dur;
          }
        }
      }
    }

    // Group day-J steps by recipe, sorted by each recipe's first step start time
    const recipeGroups = {}; // recipeId -> { recipe, mealId, color, firstStart, steps[] }
    for (const s of dayJSteps) {
      const rid = s.recipe.id+'-'+s.mealId; // unique per recipe+meal combo
      if (!recipeGroups[rid]) {
        recipeGroups[rid] = { recipe:s.recipe, mealId:s.mealId, color:s.color, firstStart:s.startMin, steps:[] };
      }
      recipeGroups[rid].steps.push(s);
      recipeGroups[rid].firstStart = Math.min(recipeGroups[rid].firstStart, s.startMin);
    }
    // Sort phases within each recipe chronologically
    for (const g of Object.values(recipeGroups)) g.steps.sort((a,b)=>a.startMin-b.startMin);
    // Sort recipe groups by their first step
    const sortedGroups = Object.values(recipeGroups).sort((a,b)=>a.firstStart-b.firstStart);

    // Build day section
    const hasSomething = dayJSteps.length > 0 || advanceSteps.length > 0;
    totalSteps += dayJSteps.length + advanceSteps.length;

    const sec = document.createElement('div');
    sec.className = 'day-section';

    // Day header
    const badge = `${dayJSteps.length+advanceSteps.length} étape${dayJSteps.length+advanceSteps.length>1?'s':''}`;
    sec.innerHTML = `
      <div class="day-header">
        <div>
          <div class="day-header-date">${lbl.name} ${lbl.date}</div>
          <div class="day-header-sub">${meals.length} repas planifié${meals.length>1?'s':''}</div>
        </div>
        <div class="day-header-badge">${hasSomething ? badge : '—'}</div>
      </div>`;

    if (!hasSomething) {
      sec.innerHTML += `<div class="day-empty">Aucun repas planifié ce jour</div>`;
      container.appendChild(sec);
      continue;
    }

    // Advance section
    if (advanceSteps.length) {
      const groups = {};
      for (const s of advanceSteps) {
        if (!groups[s.daysBack]) groups[s.daysBack] = [];
        groups[s.daysBack].push(s);
      }
      for (const db of Object.keys(groups).sort((a,b)=>b-a)) {
        const label = db==1 ? 'J − 1 · À préparer la veille' : `J − ${db} · À préparer ${db} jours avant`;
        let html = `<div class="plan-section">
          <div class="plan-section-header advance">
            <span class="psh-icon">📅</span>
            <span class="psh-title advance">${label}</span>
            <span class="psh-count">${groups[db].length} étape${groups[db].length>1?'s':''}</span>
          </div>`;
        for (const s of groups[db]) {
          const ck = `${dateKey}-${s.recipe.id}-${s.phaseIdx}`;
          const done = checkedSteps.has(ck);
          html += `<div class="step-row ${done?'done':''}" id="sr-${ck}">
            <input type="checkbox" class="step-cb" ${done?'checked':''} onchange="toggleStep('${ck}',this.checked)">
            <div class="step-time">
              <span class="step-time-range advance-label">J − ${db}</span>
              <span class="step-dur">${fmtDur(s.dur)}</span>
            </div>
            <div class="step-bar" style="background:${s.color}"></div>
            <div class="step-content">
              <div class="step-recipe">${MEAL_ICONS[s.mealId]} ${s.recipe.title}</div>
              <div class="step-name">${s.phase.letter ? s.phase.letter+'. ' : ''}${s.phase.title}</div>
            </div>
            <span class="step-phase-badge">💤 Repos</span>
          </div>`;
        }
        html += '</div>';
        sec.innerHTML += html;
      }
    }

    // Jour J section
    if (dayJSteps.length) {
      let html = `<div class="plan-section">
        <div class="plan-section-header dayj">
          <span class="psh-icon">⏰</span>
          <span class="psh-title">Jour J — par recette, ordre chronologique</span>
          <span class="psh-count">${dayJSteps.length} étape${dayJSteps.length>1?'s':''}</span>
        </div>`;
      for (const grp of sortedGroups) {
        // Recipe sub-header
        html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 16px 4px;background:var(--ice2);border-bottom:0.5px solid var(--border);">
          <div style="width:9px;height:9px;border-radius:50%;background:${grp.color};flex-shrink:0;"></div>
          <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--navy2);">${MEAL_ICONS[grp.mealId]} ${grp.recipe.title}</span>
          <span style="font-size:10px;color:var(--muted);margin-left:auto;">${MEAL_LABELS[grp.mealId]}</span>
        </div>`;
        for (const s of grp.steps) {
          const ck   = `${dateKey}-${s.recipe.id}-${s.phaseIdx}`;
          const done = checkedSteps.has(ck);
          html += `<div class="step-row ${done?'done':''}" id="sr-${ck}">
            <input type="checkbox" class="step-cb" ${done?'checked':''} onchange="toggleStep('${ck}',this.checked)">
            <div class="step-time">
              <span class="step-time-range">${minToTime(s.startMin)} → ${minToTime(s.endMin)}</span>
              <span class="step-dur">${fmtDur(s.dur)}</span>
            </div>
            <div class="step-bar" style="background:${s.color}"></div>
            <div class="step-content">
              <div class="step-name">${s.phase.letter ? s.phase.letter+'. ' : ''}${s.phase.title}</div>
            </div>
          </div>`;
        }
      }
      html += '</div>';
      sec.innerHTML += html;
    }

    container.appendChild(sec);
  }

  if (!totalSteps) {
    container.innerHTML = `<div class="week-empty"><div class="em">📋</div><p>Aucune étape de préparation trouvée.<br>Vérifiez que vos recettes ont des phases.</p></div>`;
  }
}

/* ══════════════════════════════════════
   CHECKBOX
══════════════════════════════════════ */
function toggleStep(ck, done) {
  if (done) checkedSteps.add(ck); else checkedSteps.delete(ck);
  const row = document.getElementById('sr-'+ck);
  if (row) row.classList.toggle('done', done);
  saveChecks();
}

async function saveChecks() {
  if (!sb) return;
  try {
    await sb.from('recettes_menus').upsert(
      { id:'plan-checks', data:{ checks:[...checkedSteps] }, updated_at:new Date().toISOString() },
      { onConflict:'id' }
    );
  } catch(e) { console.warn('Save checks failed:', e); }
}

/* ══════════════════════════════════════
   COLOR HELPER
══════════════════════════════════════ */
function hexLight(hex, a) {
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.round(((n>>16)&0xff)*(1-a)+255*a);
  const g=Math.round(((n>>8)&0xff)*(1-a)+255*a);
  const b=Math.round((n&0xff)*(1-a)+255*a);
  return `rgb(${r},${g},${b})`;
}

/* ══════════════════════════════════════
   STATUS
══════════════════════════════════════ */
function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status-bar '+type; el.textContent = msg;
  el.classList.remove('hidden');
  if (type==='success') setTimeout(()=>el.classList.add('hidden'), 4000);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
loadAll();
</script>
