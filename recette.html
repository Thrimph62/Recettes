<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recette</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0f2d5a;--navy2:#1a4a8a;--border:#c8d9f0;--text:#1a1a2e;--muted:#5a6a8a;--bg:#f0f2f7;--white:#fff;--gold:#b8860b;--red:#a02020;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
.app-nav{background:var(--navy);padding:0 2.5rem;display:flex;align-items:center;border-bottom:0.5px solid rgba(255,255,255,.08);}
.nav-brand{font-family:'DM Serif Display',serif;color:#fff;font-size:17px;font-weight:400;padding:1rem 0;margin-right:2rem;white-space:nowrap;text-decoration:none;}
.nav-links{display:flex;}
.nav-link{color:rgba(255,255,255,.45);text-decoration:none;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:1rem 1.2rem;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.nav-link:hover{color:rgba(255,255,255,.8);}

/* BACK BAR */
.back-bar{background:var(--white);border-bottom:0.5px solid var(--border);padding:10px 2.5rem;display:flex;align-items:center;gap:10px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--navy2);text-decoration:none;padding:5px 12px;border-radius:8px;background:var(--bg);border:0.5px solid var(--border);transition:all .15s;}
.back-btn:hover{border-color:var(--navy2);}
.breadcrumb{font-size:12px;color:var(--muted);}

/* STATES */
.state-wrap{max-width:600px;margin:4rem auto;text-align:center;padding:2rem;}
.state-icon{font-size:48px;margin-bottom:1rem;}
.state-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:.5rem;}
.state-msg{font-size:13px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* RECIPE FRAME */
#recipe-frame{width:100%;border:none;display:block;min-height:100vh;}
</style>
</head>
<body>

<nav class="app-nav">
  <a href="index.html" class="nav-brand">🍽️ Recettes</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Bibliothèque</a>
    <a href="recipe-parser.html" class="nav-link">Parseur</a>
    <a href="menu-builder.html" class="nav-link">Menu</a>
    <a href="prep-planner.html" class="nav-link">Planificateur</a>
  </div>
</nav>

<div class="back-bar">
  <a href="index.html" class="back-btn">← Bibliothèque</a>
  <span class="breadcrumb" id="breadcrumb"></span>
</div>

<div id="state-loading" class="state-wrap">
  <div class="spinner"></div>
  <div class="state-title">Chargement…</div>
</div>

<div id="state-error" class="state-wrap" style="display:none">
  <div class="state-icon">🔍</div>
  <div class="state-title">Recette introuvable</div>
  <div class="state-msg">Cette recette n'existe pas ou la connexion à la base a échoué.</div>
</div>

<div id="recipe-container" style="display:none"></div>

<script>
const SB_URL = 'https://wcmbbgkjjlohxviwjivm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjbWJiZ2tqamxvaHh2aXdqaXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDk5NTMsImV4cCI6MjA5MjE4NTk1M30.CUf2regwchLkDtCPnQn-lkVBMR42LKkvMQs3QEUfdMs';

(async () => {
  // Get id from URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError(); return; }

  let sb;
  try { sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) { showError(); return; }

  try {
    const { data, error } = await sb
      .from('recettes_recettes')
      .select('title, category, html')
      .eq('id', id)
      .single();

    if (error || !data) { showError(); return; }

    // Update page title and breadcrumb
    document.title = data.title + ' — Recettes';
    document.getElementById('breadcrumb').textContent = data.category + ' · ' + data.title;

    if (data.html) {
      // Render the stored HTML directly in an iframe for full isolation
      const container = document.getElementById('recipe-container');
      const iframe = document.createElement('iframe');
      iframe.id = 'recipe-frame';
      iframe.scrolling = 'no';
      container.appendChild(iframe);

      const iDoc = iframe.contentDocument || iframe.contentWindow.document;
      iDoc.open();
      iDoc.write(data.html);
      iDoc.close();

      // Auto-resize iframe to content height
      const resize = () => {
        try { iframe.style.height = iDoc.body.scrollHeight + 'px'; } catch(_) {}
      };
      iframe.onload = resize;
      setTimeout(resize, 300);
      setTimeout(resize, 800);

      document.getElementById('state-loading').style.display = 'none';
      container.style.display = 'block';
    } else {
      // No HTML stored — show basic recipe info
      showError();
    }
  } catch(e) {
    showError();
  }
})();

function showError() {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-error').style.display = 'block';
}
</script>
</body>
</html>
